services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: chatops
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chatops_net
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/chatops
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chatops_net
    restart: "no"

  slack_proxy_debug:
    build:
      context: .
      dockerfile: Dockerfile.slack_proxy_debug
    ports:
      - "8081:8081"
    networks:
      - chatops_net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/chatops
      SLACK_PROXY_URL: http://slack_proxy_debug:8081/post
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      slack_proxy_debug:
        condition: service_started
    networks:
      - chatops_net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/chatops
      SLACK_PROXY_URL: http://slack_proxy_debug:8081/post
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      slack_proxy_debug:
        condition: service_started
    networks:
      - chatops_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  chatops_net:
    driver: bridge

